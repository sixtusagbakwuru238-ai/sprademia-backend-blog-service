# docker-compose.yml
# Local development environment.
# Starts PostgreSQL, Redis, RabbitMQ, and pgAdmin.
# Run: docker compose up -d

version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sprademia_blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog_admin
      POSTGRES_PASSWORD: 9vFK2mQx7pL4zT8wR6cN3bY
      POSTGRES_DB: sprademia_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sprademia_blog_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sprademia_blog_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── pgAdmin (optional — database GUI) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sprademia_blog_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sprademia.ng
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"        # UI → http://localhost:5050
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles: ["tools"]  # Only start with: docker compose --profile tools up -d

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  pgadmin_data: